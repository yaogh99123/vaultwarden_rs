name: Build Vaultwarden 

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install Dependencies
        run: |
          brew install openssl mysql-client libpq pkg-config
          # 正确写入环境变量的方法
          echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl)" >> $GITHUB_ENV
          echo "MYSQLCLIENT_LIB_DIR=$(brew --prefix mysql-client)/lib" >> $GITHUB_ENV
          echo "MYSQLCLIENT_VERSION=8.0" >> $GITHUB_ENV
          echo "LIBRARY_PATH=$(brew --prefix libpq)/lib" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$(brew --prefix libpq)/lib/pkgconfig" >> $GITHUB_ENV
          echo "LIBSQLITE3_SYS_BUNDLED=1" >> $GITHUB_ENV
          
          echo "$(brew --prefix mysql-client)/bin" >> $GITHUB_PATH
          echo "$(brew --prefix libpq)/bin" >> $GITHUB_PATH

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build Vaultwarden Backend
        run: |
          cargo build --release \
            --target aarch64-apple-darwin \
            --features sqlite,mysql,postgresql

      - name: Prepare Full Package
        run: |
          mkdir -p vaultwarden-package
          cp target/aarch64-apple-darwin/release/vaultwarden ./vaultwarden-package/
          
          echo "Fetching Web Vault URL with Authentication..."
          
          # 使用 GITHUB_TOKEN 进行身份验证以避开频率限制
          WEB_JSON=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/dani-garcia/bw_web_builds/releases/latest)
          
          # 提取下载链接
          WEB_RELEASE_URL=$(echo "$WEB_JSON" | grep "browser_download_url.*tar.gz" | cut -d '"' -f 4 | head -n 1)
          
          if [ -z "$WEB_RELEASE_URL" ]; then
            echo "Error: Could not find Web Vault download URL. API response was:"
            echo "$WEB_JSON"
            exit 1
          fi

          echo "Downloading from: $WEB_RELEASE_URL"
          curl -L "$WEB_RELEASE_URL" -o web-vault.tar.gz
          tar -xzf web-vault.tar.gz -C ./vaultwarden-package/
          rm web-vault.tar.gz

          # 生成配置文件
          echo "DOMAIN=http://localhost:8080" > ./vaultwarden-package/.env
          echo "SIGNUPS_ALLOWED=true" >> ./vaultwarden-package/.env
          echo "WEB_VAULT_ENABLED=true" >> ./vaultwarden-package/.env
          echo "WEB_VAULT_FOLDER=web-vault" >> ./vaultwarden-package/.env
          echo "DATABASE_URL=data/db.sqlite3" >> ./vaultwarden-package/.env

          zip -r vaultwarden-macos-m4-full.zip vaultwarden-package/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: vaultwarden-macos-m4-full.zip
          name: Release ${{ github.ref_name }}
          body: "Vaultwarden M4 (ARM64) Full Package with Web Vault."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}